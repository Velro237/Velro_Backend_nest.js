services:
  # PostgreSQL Database
  - type: pserv
    name: velro-postgres
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile.db
    envVars:
      - key: POSTGRES_DB
        value: velro
      - key: POSTGRES_USER
        value: velro
      - key: POSTGRES_PASSWORD
        generateValue: true

  # Redis Cache
  - type: redis
    name: velro-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

  # NestJS Web Service
  - type: web
    name: velro-backend
    env: node
    plan: starter
    buildCommand: |
      npm ci --legacy-peer-deps
      npx prisma generate
      npm run build
    startCommand: |
      npx prisma migrate deploy
      npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: velro-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: velro-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
    healthCheckPath: /health
    autoDeploy: true
    branch: main
